name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.repository == 'tavallaie/pyreveal'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install Python
        run: uv python install 3.12

      - name: Install project
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest

      - name: Build
        run: uv build

      - name: Verify reveal.js is bundled in the wheel
        run: |
          uv run python - <<'PY'
          import zipfile
          from pathlib import Path
          wheel = next(Path("dist").glob("*.whl"))
          names = zipfile.ZipFile(wheel).namelist()
          assert any(n.endswith("revealjs/dist/reveal.js") for n in names), wheel
          PY

      - name: Publish to PyPI
        run: uv publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*