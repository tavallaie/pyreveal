name: Documentation

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --group docs

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages --depth=1 || true

      - name: Resolve documentation version
        id: version
        run: |
          FULL_VERSION=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          DOC_VERSION=$(uv run python -c "v='${FULL_VERSION}'.split('.'); print(f'{v[0]}.{v[1]}')")
          echo "full=${FULL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "doc=${DOC_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Deploy versioned docs
        run: |
          uv run mike deploy \
            --push \
            --update-aliases \
            --title "${{ steps.version.outputs.full }}" \
            "${{ steps.version.outputs.doc }}" \
            latest

      - name: Set default version
        run: uv run mike set-default --push latest